name: Generate Snake

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/update-script

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Jesssullivan
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark

      - name: Commit snake SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-snake.svg github-snake-dark.svg
          git diff --staged --quiet || git commit -m "chore: update contribution snake" && git push
